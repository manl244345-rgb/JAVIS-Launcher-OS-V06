kind = "mobile"
previewPath = "/"
title = "JAVIS Launcher OS"
version = "1.0.0"
id = "artifacts/javis"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22006

[services.development]
run = "pnpm --filter @workspace/javis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/javis", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/javis", "run", "serve" ]

[services.env]
PORT = "22006"
BASE_PATH = "/"
