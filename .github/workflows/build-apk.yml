name: JAVIS Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build JAVIS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (Android)
        working-directory: artifacts/javis
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/javis/android/.gradle
          key: gradle-${{ hashFiles('artifacts/javis/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Grant Gradle Permissions
        working-directory: artifacts/javis/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/javis/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: JAVIS-Launcher-OS-V06-debug
          path: artifacts/javis/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ JAVIS APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "APK available in the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          echo "Install on Redmi A1 (Android 12 Go) via ADB or file transfer." >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          find artifacts/javis/android -name "*.txt" -path "*/build/reports/*" -exec cat {} \; 2>/dev/null | head -100 >> $GITHUB_STEP_SUMMARY || true
